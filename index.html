<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>Aniocean· Stream Anime, Movies & TV-Show</title>
  <meta name="description" content="Watch the latest anime, movies, and TV series for free on Aniocean. Discover new releases effortlessly with real-time search and multi-language subs.">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:opsz,wght@14..32,400..700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg-body: #0a1929;
      --bg-header: #0f2440;
      --bg-card: #132f4c;
      --bg-surface: #1a3a5c;
      --bg-popup: #102a44;
      --text-primary: #ffffff;
      --text-secondary: #b0c7e3;
      --text-muted: #94a3b8;
      --text-widget-title: #a2c4de;
      --btn-primary: #2b6cb0;
      --btn-primary-hover: #1d4e89;
      --btn-primary-text: #ffffff;
      --btn-secondary: #334e68;
      --btn-secondary-hover: #243b53;
      --popup-btn: #5c6ac4;
      --popup-btn-text: #ffffff;
      --popup-btn-hover: #4955b5;
      --genre-tag-bg: #4c51bf;
      --link-accent: #ed64a6;
      --accent-gold: #ecc94b;
      --accent-blue: #4299e1;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --border-medium: rgba(255, 255, 255, 0.16);
      --font-title: 'Archivo Black', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-meta: 'Poppins', sans-serif;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-pill: 50px;
      --radius-circle: 50%;
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
      --transition-fast: 0.18s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg-body);
      font-family: var(--font-body);
      color: var(--text-primary);
      line-height: 1.5;
      overflow-x: hidden;
      min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; cursor: pointer; }
    img { max-width: 100%; display: block; }
    button, .btn-heart, .btn-watch { cursor: pointer; font-family: inherit; }

    /* ── HERO SLIDER ── */
    .hero-slider {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #000;
    }
    .slides-container {
      display: flex;
      transition: transform 0.55s ease-in-out;
      height: 100%;
    }
    .slide {
      min-width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 0 5%;
    }
    .slide::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(
        to right,
        rgba(10, 25, 41, 0.97) 28%,
        rgba(10, 25, 41, 0.35) 100%
      );
    }
    .slide::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 25%;
      background: linear-gradient(to top, var(--bg-body) 0%, transparent 100%);
    }
    .slide-content {
      position: relative;
      z-index: 2;
      max-width: 650px;
      width: 100%;
      margin-bottom: 15%;
    }
    .slide-title {
      font-family: var(--font-title);
      font-size: clamp(18px, 4.5vw, 38px);
      margin-bottom: 6px;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .slide-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
      align-items: center;
    }
    .meta-badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid var(--border-medium);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: clamp(0.55rem, 1.4vw, 0.72rem);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .slide-synopsis {
      font-size: clamp(0.55rem, 1.4vw, 0.82rem);
      color: rgba(255,255,255,0.78);
      margin-bottom: 14px;
      line-height: 1.45;
      max-height: 60px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .slide-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn-watch {
      background: var(--btn-primary);
      color: #fff;
      padding: clamp(8px, 1.5vw, 12px) clamp(14px, 2.5vw, 26px);
      border-radius: var(--radius-pill);
      font-weight: 700;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all var(--transition-fast);
    }
    .btn-watch:hover {
      background: var(--btn-primary-hover);
      transform: scale(1.02);
    }
    .btn-heart-slide {
      width: clamp(32px, 5vw, 44px);
      height: clamp(32px, 5vw, 44px);
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border-medium);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
      color: #fff;
      font-size: clamp(0.8rem, 2vw, 1.2rem);
    }
    .btn-heart-slide:hover {
      background: rgba(255,255,255,0.2);
    }
    .slider-nav {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 14px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 4px 16px;
      z-index: 5;
      border: 1px solid var(--border-subtle);
    }
    .slider-arrow {
      background: none;
      border: none;
      color: #fff;
      font-size: clamp(1.2rem, 2.5vw, 1.6rem);
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }
    .slider-arrow:hover {
      color: var(--btn-primary);
    }
    .slide-counter {
      font-size: clamp(0.65rem, 1.5vw, 0.85rem);
      color: rgba(255,255,255,0.85);
    }
    .slider-dots {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 5;
    }
    .dot {
      width: clamp(5px, 0.8vw, 7px);
      height: clamp(5px, 0.8vw, 7px);
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      cursor: pointer;
    }
    .dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* ── GRID & CARD ── */
    .card-title {
      font-size: 0.875rem; font-weight:600; color:#fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.3;
    }
    .card-meta-sm { font-size:0.75rem; font-weight:500; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-info-grid .card-title { font-size:0.85rem; }
    .card-info-grid .card-meta-sm { font-size:0.7rem; }
    .badge { font-size:0.625rem; font-weight:700; text-transform:uppercase; }
    .poster-status-badge { position:absolute; bottom:6px; left:6px; background:rgba(0,0,0,0.7); color:#fff; font-size:0.6rem; padding:2px 5px; border-radius:3px; z-index:2; }
    .poster-rating-badge { position:absolute; top:6px; right:6px; background:rgba(0,0,0,0.7); color:var(--accent-gold); font-size:0.6rem; padding:2px 5px; border-radius:3px; z-index:2; display:flex; align-items:center; gap:3px; }

    /* ── LAYOUT ── */
    .main-layout { display:flex; gap:0; max-width:100%; }
    .main-content { flex:0 0 68%; max-width:68%; padding:0 16px; }
    .sidebar-right { flex:0 0 32%; max-width:32%; padding:0 16px 0 8px; }
    .section { margin:30px 0; }
    .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
    .section-title { font-family:var(--font-title); font-size:1.35rem; color:var(--text-widget-title); }
    .section-controls { display:flex; align-items:center; gap:8px; }
    .view-all { font-size:0.75rem; font-weight:600; color:var(--link-accent); border:1px solid var(--link-accent); border-radius:var(--radius-pill); padding:5px 12px; white-space:nowrap; transition:all var(--transition-fast); }
    .view-all:hover { background:rgba(237,100,166,0.15); }
    .scroll-arrow { width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.06); border:1px solid var(--border-medium); display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; font-size:1rem; }
    .scroll-arrow:hover { background:rgba(255,255,255,0.14); }
    @media (max-width:1024px) { .scroll-arrow { display:none; } }

    .horizontal-scroll { display:flex; gap:14px; overflow-x:auto; scroll-behavior:smooth; padding-bottom:8px; }
    .horizontal-scroll::-webkit-scrollbar { display:none; }
    .show-card-horiz { flex:0 0 auto; width:165px; cursor:pointer; transition:transform var(--transition-fast); }
    .show-card-horiz:hover { transform:translateY(-4px); }
    .card-poster { width:100%; aspect-ratio:3/4.5; background-size:cover; background-position:center; border-radius:var(--radius-md); position:relative; overflow:hidden; margin-bottom:6px; background-color:var(--bg-card); }
    .play-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity var(--transition-fast); border-radius:var(--radius-md); }
    .play-overlay svg { width:36px; height:36px; fill:#fff; }
    .show-card-horiz:hover .play-overlay, .show-card-grid:hover .play-overlay { opacity:1; }
    .ranking-badge { position:absolute; top:6px; right:6px; background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); color:#fff; font-weight:700; font-size:0.7rem; padding:2px 7px; border-radius:4px; z-index:2; }
    .quality-badge { position:absolute; top:6px; left:6px; background:rgba(0,0,0,0.7); color:#fff; font-size:0.62rem; padding:2px 5px; border-radius:3px; z-index:2; font-weight:600; }
    .score-badge { position:absolute; top:6px; right:6px; background:rgba(0,0,0,0.7); color:var(--accent-gold); font-size:0.65rem; padding:2px 5px; border-radius:3px; z-index:2; font-weight:600; display:flex; align-items:center; gap:3px; }

    /* NEW ON ANIOCEAN SECTION */
    .new-aniocean-grid { 
      display:grid; 
      grid-template-columns:repeat(7, 1fr); 
      gap:12px; 
    }
    @media (max-width: 1400px) {
      .new-aniocean-grid { grid-template-columns:repeat(6, 1fr); }
    }
    @media (max-width: 1200px) {
      .new-aniocean-grid { grid-template-columns:repeat(5, 1fr); }
    }
    @media (max-width: 992px) {
      .new-aniocean-grid { grid-template-columns:repeat(4, 1fr); }
    }
    @media (max-width: 768px) {
      .new-aniocean-grid { grid-template-columns:repeat(3, 1fr); gap:10px; }
    }
    @media (max-width: 480px) {
      .new-aniocean-grid { grid-template-columns:repeat(2, 1fr); }
    }
    
    .aniocean-card {
      position: relative;
      cursor: pointer;
      transition: transform var(--transition-fast);
    }
    .aniocean-card:hover {
      transform: translateY(-4px);
    }
    .aniocean-poster {
      position: relative;
      aspect-ratio: 3/4.5;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-card);
    }
    .aniocean-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .aniocean-badge-score {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,0.8);
      color: var(--accent-gold);
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 3px;
      z-index: 2;
    }
    .aniocean-badge-lang {
      position: absolute;
      bottom: 6px;
      left: 6px;
      display: flex;
      gap: 4px;
      z-index: 2;
    }
    .aniocean-lang-badge {
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 3px 5px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .aniocean-lang-badge i {
      font-size: 0.7rem;
    }
    .aniocean-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 30px 6px 6px;
      background: linear-gradient(to top, rgba(10,25,41,0.95) 0%, rgba(10,25,41,0.7) 40%, transparent 100%);
      text-align: center;
      pointer-events: none;
    }
    .aniocean-meta {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-bottom: 2px;
      font-weight: 500;
    }
    .aniocean-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .grid-container { display:grid; grid-template-columns:repeat(auto-fill, minmax(185px,1fr)); gap:16px; }
    @media (min-width:768px){ .grid-container{ grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); } }
    .show-card-grid { border-radius:var(--radius-md); overflow:hidden; cursor:pointer; transition:transform var(--transition-fast); position:relative; }
    .show-card-grid:hover { transform:translateY(-3px); }
    .show-card-grid .card-poster {
      aspect-ratio: 3/4.5;
      border-radius: 0;
      margin-bottom: 0;
    }
    .card-info-grid {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 8px 8px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      color: #fff;
      pointer-events: none;
    }

    .toggle-tabs { display:flex; gap:4px; }
    .toggle-tab { padding:5px 12px; border-radius:var(--radius-pill); background:rgba(255,255,255,0.04); border:1px solid var(--border-medium); font-size:0.72rem; cursor:pointer; transition:all var(--transition-fast); color:var(--text-secondary); font-weight:500; }
    .toggle-tab.active { background:var(--popup-btn); color:#fff; border-color:var(--popup-btn); font-weight:600; }

    /* sidebar */
    .sidebar-list-item { display:flex; gap:10px; align-items:center; padding:8px; border-radius:var(--radius-sm); cursor:pointer; transition:background var(--transition-fast); margin-bottom:4px; }
    .sidebar-list-item:hover { background:var(--bg-surface); }
    .sidebar-rank { font-size:1.4rem; font-weight:700; color:rgba(255,255,255,0.12); width:30px; text-align:center; flex-shrink:0; font-family:var(--font-title); }
    .sidebar-poster { width:50px; height:70px; object-fit:cover; border-radius:var(--radius-sm); flex-shrink:0; background:var(--bg-card); }
    .sidebar-info h4 { 
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: normal;
      line-height: 1.3;
    }
    .side-meta { font-size:0.6875rem; color:var(--text-muted); margin-top:2px; }

    /* popup */
    .popup-overlay { position:fixed; inset:0; z-index:500; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .popup-card { background:var(--bg-popup); border:1px solid var(--border-medium); border-radius:var(--radius-lg); padding:20px; max-width:520px; width:94%; max-height:85vh; overflow-y:auto; box-shadow:var(--shadow-lg); pointer-events:auto; display:none; position:relative; color:#fff; }
    .popup-card.active { display:block; }
    .popup-close { position:absolute; top:12px; right:16px; font-size:1.4rem; cursor:pointer; color:#cbd5e1; line-height:1; z-index:2; }
    .modal-poster-wrap { width:120px; flex-shrink:0; border-radius:10px; overflow:hidden; float:left; margin-right:16px; margin-bottom:12px; }
    .modal-poster-wrap img { width:100%; height:auto; display:block; }
    .modal-title { font-weight:700; font-size:1.1rem; line-height:1.3; margin-bottom:4px; color:#fff; word-break:break-word; }
    .modal-subtitle { font-size:0.85rem; color:var(--text-muted); margin-bottom:12px; }
    .meta-pills-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
    .meta-pill { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); border-radius:20px; padding:3px 10px; font-size:0.7rem; font-weight:500; color:#e0f0ff; white-space:nowrap; display:flex; align-items:center; gap:4px; }
    .meta-pill svg { width:12px; height:12px; }
    .genre-pills-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
    .genre-pill { background:rgba(126,200,224,0.2); border:1px solid #7ec8e0; border-radius:20px; padding:2px 10px; font-size:0.65rem; font-weight:600; color:#7ec8e0; cursor:pointer; text-decoration:none; transition:background 0.2s; }
    .genre-pill:hover { background:rgba(126,200,224,0.4); }
    .watch-btn { display:inline-block; background:var(--accent-gold); color:#1a1a1a; font-weight:700; padding:10px 24px; border-radius:40px; text-decoration:none; font-size:0.9rem; margin:0 0 16px 0; transition:background 0.2s, transform 0.1s; border:none; cursor:pointer; }
    .watch-btn:hover { background:#f59e0b; transform:scale(1.02); }
    .modal-synopsis { font-size:0.8rem; line-height:1.5; color:#ddd; white-space:pre-wrap; clear:both; }

    /* ANIKOTO STYLE POPUP */
    .anikoto-popup {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .anikoto-popup-poster {
      width: 110px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
    }
    .anikoto-popup-poster img {
      width: 100%;
      height: auto;
      display: block;
    }
    .anikoto-popup-content {
      flex: 1;
      min-width: 0;
    }
    .anikoto-popup-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .anikoto-popup-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .anikoto-meta-item {
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .anikoto-popup-synopsis {
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .anikoto-popup-actions {
      display: flex;
      gap: 8px;
    }
    .anikoto-btn {
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .anikoto-btn-primary {
      background: var(--btn-primary);
      color: #fff;
    }
    .anikoto-btn-primary:hover {
      background: var(--btn-primary-hover);
    }
    .anikoto-btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid var(--border-medium);
    }
    .anikoto-btn-secondary:hover {
      background: rgba(255,255,255,0.2);
    }

    /* SCHEDULE */
    .esw-widget { 
      background:var(--bg-card); 
      border:1px solid var(--border-subtle); 
      border-radius:var(--radius-md); 
      overflow:hidden; 
      margin-top:20px; 
    }
    .esw-head { 
      padding:10px 12px; 
      display:flex; 
      justify-content:space-between; 
      align-items: center;
      border-bottom:1px solid var(--border-subtle); 
      background:var(--bg-surface); 
      font-size:0.78rem; 
      font-weight:700; 
      color:#fff; 
    }
    .esw-clock-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .esw-clock-icon {
      color: var(--accent-blue);
      font-size: 0.85rem;
    }
    .esw-clock-pill { 
      display:flex; 
      align-items:center; 
      gap:5px; 
      background:var(--bg-body); 
      border:1px solid var(--border-medium); 
      border-radius:var(--radius-pill); 
      padding:3px 8px; 
      font-size:0.65rem; 
      color:var(--text-muted); 
    }
    .esw-days-row { 
      display:flex; 
      align-items:center; 
      padding:6px 4px; 
      border-bottom:1px solid var(--border-subtle); 
    }
    .esw-nav-btn { 
      background:none; 
      border:none;

  <script>
    (function() {
      const ANIKOTO_API = 'https://anikoto.bionmovies47.workers.dev';
      const TMDB_PROXY = 'https://aniocen.bionmovies47.workers.dev';
      const JIKAN_BASE = 'https://api.jikan.moe/v4';
      const TMDB_IMAGE = 'https://image.tmdb.org/t/p';
      const tmdbImg = (p,s='w500') => p ? `${TMDB_IMAGE}/${s}${p}` : '';
      const tmdbBack = (p) => p ? `${TMDB_IMAGE}/w1280${p}` : '';

      function infoUrl(show) {
        const id = show.id;
        const title = (show.title || '').trim();
        const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');

        let type = 'anime';
        let prefixId = id;

        if (id.startsWith('jikan-') || id.startsWith('jikan-air-') || id.startsWith('jikan-up-') || id.startsWith('jikan-comp-')) {
          type = 'anime';
          prefixId = id.replace(/^jikan-(?:air|up|comp-)?/, 'jikan-');
        } else if (id.startsWith('tmdb-mv-') || id.startsWith('tmdb-movie-') || id.startsWith('tmdb-up-')) {
          type = 'movie';
          const numeric = id.replace(/^tmdb-(?:mv|movie|up)-/, '');
          prefixId = `tmdb-movie-${numeric}`;
        } else if (id.startsWith('tmdb-tv-') || (id.startsWith('tmdb-comp-') && !id.includes('movie'))) {
          type = 'tv';
          const numeric = id.replace(/^tmdb-(?:tv|comp)-/, '');
          prefixId = `tmdb-tv-${numeric}`;
        } else if (/^\d+$/.test(id)) {
          type = 'anime';
          prefixId = `jikan-${id}`;
        }

        const base = `/info/${type}/${prefixId}`;
        return slug ? `${base}/${slug}` : base;
      }

      const GENRE_MAP = {
        28:'Action',12:'Adventure',16:'Animation',35:'Comedy',80:'Crime',99:'Documentary',
        18:'Drama',10751:'Family',14:'Fantasy',36:'History',27:'Horror',10402:'Music',
        9648:'Mystery',10749:'Romance',878:'Science Fiction',10770:'TV Movie',53:'Thriller',
        10752:'War',37:'Western',10759:'Action & Adventure',10762:'Kids',10763:'News',
        10764:'Reality',10765:'Sci-Fi & Fantasy',10766:'Soap',10767:'Talk',10768:'War & Politics'
      };

      const RATING_EXPLAIN = {
        'g':'All Ages','pg':'Children','pg_13':'Teens 13+','r':'17+ (violence & profanity)',
        'r+':'Mild Nudity','rx':'Hentai','none':'Unrated'
      };

      async function fetchAnikoto(endpoint) {
  try {
    const res = await fetch(`${ANIKOTO_API}${endpoint}`, {
      method: 'GET',
      headers: { 'Accept': 'application/json' }
    });
    if (!res.ok) {
      console.error(`Anikoto API HTTP ${res.status}`);
      return { ok: false, data: [] };
    }
    const json = await res.json();
    // Wrap the raw JSON with an ok flag, ensuring data is accessible
    return { ok: true, data: json.data || json };
  } catch(e) {
    console.error('Anikoto fetch error:', e);
    return { ok: false, data: [] };
  }
}

      async function fetchTMDB(endpoint, params='') {
        const url = `${TMDB_PROXY}/3${endpoint}?${params}`;
        const res = await fetch(url); if(!res.ok) return {results:[]};
        return res.json();
      }
      async function fetchJikan(endpoint, params='') {
        const url = `${JIKAN_BASE}/${endpoint}?${params}`;
        const res = await fetch(url); if(!res.ok) return {data:[]};
        return res.json();
      }

      /* ── NEW ON ANIOCEAN ── */
     /* Store fetched data for popup lookup */
window.anioceanData = {};

async function loadNewAniocean() {
  try {
    const response = await fetchAnikoto('/recent-anime?page=1&per_page=30');
    
    if (!response.ok || !response.data || response.data.length === 0) {
      document.getElementById('newAnioceanGrid').innerHTML = 
        '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">No recent anime available</div>';
      return;
    }
    
    const data = response.data;
    const grid = document.getElementById('newAnioceanGrid');
    
    grid.innerHTML = data.map(anime => {
      const studio = anime.terms_by_type?.studios?.[0] || '?';
      const rating = anime.rating || 'N/A';
      const type = anime.terms_by_type?.type?.[0] || 'TV';
      const score = anime.score || 'N/A';
      const mal_id = anime.mal_id || anime.id || '';
      
      // Store data for popup lookup
      window.anioceanData[mal_id] = {
        title: anime.title,
        slug: anime.slug,
        mal_id: mal_id,
        poster: anime.poster,
        score: score,
        type: type,
        rating: rating,
        description: anime.description || 'No description available.',
        year: anime.year || '?',
        duration: anime.duration + 'm' || '?',
        genres: anime.terms_by_type?.genre || [],
        studios: anime.terms_by_type?.studios || [],
        is_sub: anime.is_sub || 0,
        is_dub: anime.is_dub || 0
      };
      
      return `
        <a href="/info/anime/jikan-${mal_id}/${anime.slug}" 
           class="aniocean-card" 
           data-mal-id="${mal_id}"
           onmouseenter="showAnikotoPopupById('${mal_id}')" 
           onmouseleave="window.popupTimer=setTimeout(hidePopup,500)">
          <div class="aniocean-poster">
            <img src="${anime.poster}" alt="${anime.title}" 
                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22300%22%3E%3Crect fill=%22%23132f4c%22 width=%22200%22 height=%22300%22/%3E%3Ctext fill=%22%2394a3b8%22 font-family=%22sans-serif%22 font-size=%2214%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENo Image%3C/text%3E%3C/svg%3E'">
            <div class="aniocean-badge-score">
              <i class="fas fa-star"></i> ${score}
            </div>
            <div class="aniocean-badge-lang">
              ${anime.is_sub > 0 ? `<div class="aniocean-lang-badge"><i class="fas fa-closed-captioning"></i> ${anime.is_sub}</div>` : ''}
              ${anime.is_dub > 0 ? `<div class="aniocean-lang-badge"><i class="fas fa-microphone"></i> ${anime.is_dub}</div>` : ''}
            </div>
            <div class="aniocean-info">
              <div class="aniocean-meta">${type} · ${rating} · ${studio}</div>
              <div class="aniocean-title">${anime.title}</div>
            </div>
          </div>
        </a>
      `;
    }).join('');
    
    console.log(`✓ Loaded ${data.length} anime for "New on Aniocean"`);
  } catch (error) {
    console.error('✗ Error loading New on Aniocean:', error);
    document.getElementById('newAnioceanGrid').innerHTML = 
      '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">Failed to load</div>';
  }
}

      /* ── ANIKOTO STYLE POPUP ── */
     /* Popup triggered by mal_id lookup */
window.showAnikotoPopupById = function(mal_id) {
  clearTimeout(window.popupTimer);
  const anime = window.anioceanData[mal_id];
  if (!anime) return;
  
  const starIcon = '<i class="fas fa-star" style="color:var(--accent-gold)"></i>';
  const genresHtml = anime.genres.map(g => `<a href="/search?genre=${encodeURIComponent(g)}" class="genre-pill">${g}</a>`).join('');
  
  document.getElementById('popupContent').innerHTML = `
    <div class="anikoto-popup">
      <div class="anikoto-popup-poster">
        <img src="${anime.poster}" alt="${anime.title}" onerror="this.style.display='none'">
      </div>
      <div class="anikoto-popup-content">
        <div class="anikoto-popup-title">${anime.title}</div>
        <div class="anikoto-popup-meta">
          <div class="anikoto-meta-item">${starIcon} ${anime.score}</div>
          <div class="anikoto-meta-item"><i class="fas fa-film"></i> ${anime.type}</div>
          <div class="anikoto-meta-item"><i class="fas fa-calendar"></i> ${anime.year}</div>
          <div class="anikoto-meta-item"><i class="fas fa-clock"></i> ${anime.duration}</div>
          <div class="anikoto-meta-item"><i class="fas fa-building"></i> ${anime.studios[0] || '?'}</div>
        </div>
        <div class="genre-pills-row">${genresHtml}</div>
        <div class="anikoto-popup-synopsis">${anime.description}</div>
        <div class="anikoto-popup-actions">
          <a href="/watch/jikan-${anime.mal_id}" class="anikoto-btn anikoto-btn-primary">
            <i class="fas fa-play"></i> Watch
          </a>
          <a href="/info/anime/jikan-${anime.mal_id}/${anime.slug}" class="anikoto-btn anikoto-btn-secondary">
            <i class="fas fa-plus"></i> Details
          </a>
        </div>
      </div>
    </div>
  `;
  
  document.getElementById('popupCard').classList.add('active');
  document.getElementById('popupOverlay').style.pointerEvents = 'auto';
};

      /* ── HERO ── */
      let heroData=[], currentSlide=0;
      async function loadHero() {
        const [airingAnime, onAirTV, nowMovies] = await Promise.all([
          fetchJikan('top/anime', 'filter=airing&limit=7'),
          fetchTMDB('/tv/on_the_air', 'language=en-US&page=1'),
          fetchTMDB('/movie/now_playing', 'language=en-US&page=1')
        ]);
        const animes = (airingAnime.data||[]).map(a => ({
          id:`jikan-${a.mal_id}`, title:a.title, type:'Anime',
          genres:(a.genres||[]).map(g=>g.name), score:(a.score||0).toFixed(1),
          year:(a.aired?.from||'').slice(0,4), duration:a.duration||'?',
          synopsis:a.synopsis||'', backdrop: a.images?.jpg?.large_image_url||'',
          poster:a.images?.jpg?.large_image_url||'', certification:a.rating||'PG-13',
        }));
        const moviesPromises = (nowMovies.results||[]).slice(0,7).map(async i => {
          const detail = await fetchTMDB(`/movie/${i.id}`, 'language=en-US');
          const d = detail || {};
          return {
            id:`tmdb-movie-${i.id}`, title:i.title, type:'Movie',
            genres:(i.genre_ids||[]).map(id => GENRE_MAP[id]||id),
            score:(i.vote_average||0).toFixed(1),
            year:(i.release_date||'').slice(0,4),
            duration: d.runtime ? `${d.runtime} min` : '2h 10m',
            synopsis:i.overview||'', backdrop:tmdbBack(i.backdrop_path), poster:tmdbImg(i.poster_path),
            certification: d.adult ? '18+' : (d.release_dates?.results?.find(r=>r.iso_3166_1==='US')?.release_dates?.[0]?.certification || 'PG-13'),
          };
        });
        const movies = await Promise.all(moviesPromises);
        const tvPromises = (onAirTV.results||[]).slice(0,7).map(async i => {
          const detail = await fetchTMDB(`/tv/${i.id}`, 'language=en-US');
          const d = detail || {};
          return {
            id:`tmdb-tv-${i.id}`, title:i.name, type:'TV',
            genres:(i.genre_ids||[]).map(id => GENRE_MAP[id]||id),
            score:(i.vote_average||0).toFixed(1),
            year:(i.first_air_date||'').slice(0,4),
            duration: d.episode_run_time?.length ? `${d.episode_run_time[0]}m/ep` : '45m/ep',
            synopsis:i.overview||'', backdrop:tmdbBack(i.backdrop_path), poster:tmdbImg(i.poster_path),
            certification: d.content_ratings?.results?.find(r=>r.iso_3166_1==='US')?.rating || 'PG-13',
          };
        });
        const tvs = await Promise.all(tvPromises);
        const interleaved = [];
        const max = Math.max(animes.length, tvs.length, movies.length);
        for (let i=0; i<max; i++) {
          if(animes[i]) interleaved.push(animes[i]);
          if(tvs[i]) interleaved.push(tvs[i]);
          if(movies[i]) interleaved.push(movies[i]);
        }
        heroData = interleaved.slice(0,19);
        renderHero();
      }
      function renderHero() {
        const container = document.getElementById('slidesContainer');
        container.innerHTML = heroData.map((s,i) => `
          <div class="slide" data-index="${i}" style="background-image:url('${s.backdrop||s.poster}');">
            <div class="slide-content">
              <h1 class="slide-title">${s.title}</h1>
              <div class="slide-meta">
                <span class="meta-badge">${s.type}</span>
                <span class="meta-badge"><i class="fas fa-calendar-alt"></i> ${s.year}</span>
                <span class="meta-badge"><i class="fas fa-clock"></i> ${s.duration}</span>
                <span class="meta-badge">${s.certification||'PG-13'}</span>
                ${s.genres.slice(0,3).map(g => `<span class="meta-badge">${g}</span>`).join('')}
                <span class="meta-badge"><i class="fas fa-star" style="color:var(--accent-gold)"></i> ${s.score}</span>
              </div>
              <p class="slide-synopsis">${s.synopsis?.slice(0,250)||''}</p>
              <div class="slide-actions">
                <a href="/watch/${s.id}" class="btn-watch"><i class="fas fa-play"></i> Watch Now</a>
                <a href="${infoUrl(s)}" class="btn-heart-slide"><i class="far fa-heart"></i></a>
              </div>
            </div>
          </div>`).join('');

let upcomingShows = [];

async function loadUpcoming() {
  const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD

  // 1. Upcoming movies (TMDB) – filter only future releases
  const tmdbMovies = await fetchTMDB('/movie/upcoming', 'language=en-US&page=1');
  const futureMovies = (tmdbMovies.results || []).filter(m => m.release_date && m.release_date > today);
  const movies = futureMovies.slice(0, 40).map(i => ({
    id: `tmdb-movie-${i.id}`,                 // ✅ correct movie ID
    title: i.title,
    original_title: i.original_title || i.title,
    type: 'Movie',
    poster: tmdbImg(i.poster_path),
    score: (i.vote_average || 0).toFixed(1),
    genres: (i.genre_ids || []).map(id => GENRE_MAP[id] || id),
    releaseDate: i.release_date || '',
    synopsis: i.overview || '',
    certification: i.adult ? '18+' : 'PG-13',
    studio: '?',
    backdrop: tmdbBack(i.backdrop_path),
    duration: '2h 10m',
    first_air_date: null
  }));

  // 2. Upcoming TV series (TMDB) – discover with first_air_date >= today
  const tvFuture = await fetchTMDB('/discover/tv', `first_air_date.gte=${today}&sort_by=first_air_date.asc&page=1`);
  const tvShows = (tvFuture.results || []).slice(0, 40).map(i => ({
    id: `tmdb-tv-${i.id}`,                    // ✅ correct TV ID
    title: i.name,
    original_title: i.original_name || i.name,
    type: 'TV',
    poster: tmdbImg(i.poster_path),
    score: (i.vote_average || 0).toFixed(1),
    genres: (i.genre_ids || []).map(id => GENRE_MAP[id] || id),
    releaseDate: i.first_air_date || '',
    synopsis: i.overview || '',
    certification: 'PG-13',
    studio: '?',
    backdrop: tmdbBack(i.backdrop_path),
    duration: '45m/ep',
    first_air_date: i.first_air_date
  }));

  // 3. Upcoming anime (Jikan) – fetch pages 1, 2 and 3 (limit=25 each)
  const animePages = await Promise.all([
    fetchJikan('top/anime', 'filter=upcoming&limit=25&page=1'),
    fetchJikan('top/anime', 'filter=upcoming&limit=25&page=2'),
    fetchJikan('top/anime', 'filter=upcoming&limit=25&page=3')
  ]);
  const allAnime = animePages.flatMap(page => page.data || []);
  // Remove duplicates by mal_id
  const uniqueAnime = [];
  const seen = new Set();
  for (const a of allAnime) {
    if (!seen.has(a.mal_id)) {
      seen.add(a.mal_id);
      uniqueAnime.push(a);
    }
  }
  const anime = uniqueAnime.slice(0, 60).map(a => ({
    id: `jikan-up-${a.mal_id}`,              // ✅ anime ID (works with infoUrl)
    title: a.title_english || a.title,
    original_title: a.title_japanese || a.title,
    type: 'Anime',
    poster: a.images?.jpg?.large_image_url || '',
    score: (a.score || 0).toFixed(1),
    genres: (a.genres || []).map(g => g.name),
    releaseDate: (a.aired?.from || '').slice(0, 10),
    synopsis: a.synopsis || '',
    certification: a.rating || 'PG-13',
    studio: (a.studios || [])[0]?.name || '?',
    duration: a.duration || '?',
    first_air_date: null
  }));

  // Combine all, remove any that still have a past release date
  const allShows = [...movies, ...tvShows, ...anime];
  const now = new Date();
  const validShows = allShows.filter(show => {
    if (!show.releaseDate) return true;
    const showDate = new Date(show.releaseDate);
    return showDate >= now;
  });

  // Sort by release date (closest first) and limit to 80 items
  validShows.sort((a, b) => {
    if (!a.releaseDate) return 1;
    if (!b.releaseDate) return -1;
    return new Date(a.releaseDate) - new Date(b.releaseDate);
  });
  upcomingShows = validShows.slice(0, 80);
  renderUpcoming();

            };
          });
        });
        
        updateScheduleUI();
        updateClock();
        setInterval(updateClock, 60000);
      }
      
      function calculateEpisodeNumber(anime) {
        if (!anime.aired?.from || !anime.broadcast?.string) return '?';
        
        const startDate = new Date(anime.aired.from);
        const now = new Date();
        const diffTime = Math.abs(now - startDate);
        const diffWeeks = Math.floor(diffTime / (1000 * 60 * 60 * 24 * 7));
        
        // If status is finished airing, show total episodes
        if (anime.status === 'Finished Airing') {
          return anime.episodes || diffWeeks;
        }
        
        // For currently airing, calculate based on weeks passed
        return Math.min(diffWeeks + 1, anime.episodes || diffWeeks + 1);
      }
      
      function buildWeek(){ 
        const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate()); 
        const sun=new Date(today); 
        sun.setDate(today.getDate()-today.getDay()+eswWeek*7); 
        return Array.from({length:7},(_,i)=>new Date(sun.getFullYear(),sun.getMonth(),sun.getDate()+i)); 
      }
      
      function updateScheduleUI(){
        const days=buildWeek();
        const today = new Date();
        const currentDayIndex = today.getDay();
        
        // Auto-select today's day on first load
        if (eswWeek === 0 && eswSel === 0) {
          eswSel = currentDayIndex;
        }
        
        document.getElementById('eswDaysScroll').innerHTML = days.map((d,i) => {
          const isToday = d.toDateString() === today.toDateString();
          const isActive = i === eswSel;
          return `<div class="esw-day-card${isToday?' today':''}${isActive?' active':''}" data-i="${i}">
            <div class="esw-dc-date">${d.getDate()}</div>
            <small>${DAY_NAMES[d.getDay()]}</small>
          </div>`;
        }).join('');
        
        const day = days[eswSel];
        const dayName = DAYS[day.getDay()];
        const list = eswData[dayName] || [];
        
        // Sort by broadcast time
        list.sort((a, b) => {
          if (!a.aired || !b.aired) return 0;
          return a.aired - b.aired;
        });
        
        // Separate aired and upcoming
        const now = new Date();
        const aired = list.filter(item => item.aired && item.aired < now);
        const upcoming = list.filter(item => !item.aired || item.aired >= now);
        
        const renderRow = (item, isAired) => `
          <a class="esw-row ${isAired ? 'aired' : 'airing'}" href="${item.url}">
            <img class="esw-row-poster" src="${item.poster}" onerror="this.style.display='none'">
            <div class="esw-row-content">
              <div class="esw-row-time">${item.aired ? item.aired.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false}) : 'TBA'}</div>
              <div class="esw-row-title">${item.title}</div>
            </div>
            <span class="esw-row-ep">EP ${item.episode}</span>
          </a>
        `;
        
        const displayList = [...aired, ...upcoming];
        const defaultShow = 9;
        const moreItems = displayList.slice(defaultShow);
        const defaultItems = displayList.slice(0, defaultShow);
        
        let html = defaultItems.map((item, idx) => {
          const isAired = idx < aired.length;
          return renderRow(item, isAired);
        }).join('');
        
        if (moreItems.length > 0) {
          html += `<div id="eswMoreList" style="display:none;">${moreItems.map((item, idx) => {
            const isAired = idx < (aired.length - defaultShow);
            return renderRow(item, isAired);
          }).join('')}</div>`;
          html += `<button class="esw-more-btn" id="eswMoreBtn" onclick="toggleMoreSchedule()">Show More (${moreItems.length})</button>`;
        }
        
        if (displayList.length === 0) {
          html = '<div style="text-align:center;padding:20px;color:var(--text-muted);">No episodes scheduled</div>';
        }
        
        document.getElementById('eswBody').innerHTML = html;
      }
      
      window.toggleMoreSchedule = function() {
        const moreList = document.getElementById('eswMoreList');
        const moreBtn = document.getElementById('eswMoreBtn');
        if (moreList && moreBtn) {
          if (moreList.style.display === 'none') {
            moreList.style.display = 'block';
            moreBtn.textContent = 'Show Less';
          } else {
            moreList.style.display = 'none';
            const count = moreList.children.length;
            moreBtn.textContent = `Show More (${count})`;
          }
        }
      };
      
      function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-US', {
          hour: '2-digit',
          minute: '2-digit',
          timeZoneName: 'short'
        });
        document.getElementById('eswClockText').textContent = timeStr;
      }
      
      document.getElementById('eswPrev').addEventListener('click',()=>{
        eswWeek--;
        eswSel=0;
        updateScheduleUI();
      });
      document.getElementById('eswNext').addEventListener('click',()=>{
        eswWeek++;
        eswSel=0;
        updateScheduleUI();
      });
      document.getElementById('eswDaysScroll').addEventListener('click',e=>{
        const card=e.target.closest('.esw-day-card'); 
        if(card){
          eswSel=parseInt(card.dataset.i);
          updateScheduleUI();
        }
      });

      function init() {
        loadHero();
        loadTopAiring();
        loadNewReleases();
        loadNewAniocean(); // Load new section
        loadUpcoming();
        loadCompleted(1);
        loadTrending('today');
        loadPopular();
        loadSchedule();
      }
      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
