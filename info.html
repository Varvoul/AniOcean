<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>Aniocean · Show Info</title>
  <meta name="description" content="Detailed information about your favorite anime, movies and TV shows.">
  <!-- Supabase & shared components -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared.js"></script>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ========== LOCKED COLOR SCHEMA ========== */
    :root {
      --bg-body: #0a1929;
      --bg-header: #0f2440;
      --bg-card: #132f4c;
      --bg-surface: #1a3a5c;
      --bg-popup: #102a44;
      --text-primary: #ffffff;
      --text-secondary: #b0c7e3;
      --text-muted: #94a3b8;
      --text-widget-title: #a2c4de;
      --btn-primary: #2b6cb0;
      --btn-primary-hover: #1d4e89;
      --btn-primary-text: #ffffff;
      --btn-secondary: #334e68;
      --btn-secondary-hover: #243b53;
      --popup-btn: #5c6ac4;
      --popup-btn-text: #ffffff;
      --popup-btn-hover: #4955b5;
      --genre-tag-bg: #4c51bf;
      --link-accent: #ed64a6;
      --accent-gold: #ecc94b;
      --accent-blue: #4299e1;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --border-medium: rgba(255, 255, 255, 0.16);
      --font-title: 'Archivo Black', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-meta: 'Poppins', sans-serif;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-pill: 50px;
      --radius-circle: 50%;
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
      --transition-fast: 0.18s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg-body);
      font-family: var(--font-body);
      color: var(--text-primary);
      line-height: 1.5;
      overflow-x: hidden;
      min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; cursor: pointer; }
    img { max-width: 100%; display: block; }
    button, .btn-heart, .btn-watch { cursor: pointer; font-family: inherit; }

    /* ── BREADCRUMBS ── */
    .breadcrumbs { padding: 12px 0; display: flex; align-items: center; flex-wrap: wrap; font-size: 0.85rem; color: var(--text-muted); }
    .breadcrumbs a { color: var(--text-secondary); }
    .breadcrumbs .separator { margin: 0 6px; color: var(--text-muted); }
    .breadcrumbs .current { color: #fff; }

    /* ── BACKDROP & POSTER OVERLAP ── */
    .backdrop-wrap { width: 100%; aspect-ratio: 16 / 6; overflow: hidden; border-radius: var(--radius-md); position: relative; }
    .backdrop-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .poster-overlap { display: flex; margin-top: -60px; position: relative; z-index: 10; align-items: flex-end; }
    .poster-img { width: 200px; aspect-ratio: 2/3; border-radius: var(--radius-md); border: 3px solid #fff; box-shadow: var(--shadow-lg); background: var(--bg-card); }
    .title-metadata { flex: 1; margin-left: 20px; padding-bottom: 10px; }
    .show-title { font-family: var(--font-title); font-size: 2rem; margin-bottom: 8px; color: #fff; }
    .meta-row { display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.85rem; color: var(--text-secondary); align-items: center; }
    .badge-sub, .badge-dub { display: inline-block; padding: 3px 10px; border-radius: var(--radius-pill); font-size: 0.7rem; font-weight: 600; }
    .badge-sub { background: var(--btn-primary); color: #fff; }
    .badge-dub { background: var(--popup-btn); color: #fff; }

    /* ── BUTTONS ── */
    .btn-row { display: flex; gap: 12px; margin: 16px 0; align-items: center; }
    .btn-watch { background: var(--btn-primary); color: #fff; padding: 10px 24px; border-radius: var(--radius-pill); font-weight: 700; display: inline-flex; align-items: center; gap: 6px; transition: all var(--transition-fast); }
    .btn-watch:hover { background: var(--btn-primary-hover); }
    .btn-addlist { position: relative; }
    .btn-addlist button { background: var(--bg-surface); color: #fff; padding: 10px 24px; border-radius: var(--radius-pill); font-weight: 600; border: 1px solid var(--border-medium); display: flex; align-items: center; gap: 6px; cursor: pointer; transition: all var(--transition-fast); }
    .btn-addlist button:hover { background: rgba(255,255,255,0.1); }
    .status-dropdown { display: none; position: absolute; top: 100%; left: 0; background: var(--bg-popup); border: 1px solid var(--border-medium); border-radius: var(--radius-md); padding: 8px; min-width: 220px; z-index: 50; }
    .status-dropdown.open { display: block; }
    .status-dropdown label { display: flex; align-items: center; gap: 8px; padding: 6px 10px; font-size: 0.8rem; color: var(--text-secondary); cursor: pointer; border-radius: 4px; }
    .status-dropdown label:hover { background: rgba(255,255,255,0.06); }
    .status-dropdown input[type="checkbox"] { accent-color: var(--btn-primary); }
    .share-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border-medium); transition: all var(--transition-fast); }
    .share-btn:hover { background: rgba(255,255,255,0.15); }

    /* ── INFO BOX (Score / Format / Duration) ── */
    .info-box { display: flex; justify-content: space-around; background: var(--bg-surface); border-radius: var(--radius-md); padding: 14px; margin: 16px 0; flex-wrap: wrap; }
    .info-box .item { text-align: center; }
    .info-box .label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
    .info-box .value { font-size: 1.2rem; font-weight: 700; margin-top: 4px; }

    /* ── SYNOPSIS ── */
    .synopsis-box { background: var(--bg-surface); border-radius: var(--radius-md); padding: 14px; margin: 16px 0; max-height: 300px; overflow-y: auto; }

    /* ── DETAILS GRID ── */
    .details-grid { background: var(--bg-surface); border-radius: var(--radius-md); padding: 14px; margin: 16px 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
    .detail-item .label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
    .detail-item .value { font-size: 0.85rem; margin-top: 4px; }
    .genres-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
    .genres-tags a { background: var(--genre-tag-bg); color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; transition: opacity var(--transition-fast); }
    .genres-tags a:hover { opacity: 0.8; }

    /* ── SEASONS ── */
    .seasons-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 16px 0; }
    .season-card { position: relative; aspect-ratio: 16/9; border-radius: var(--radius-md); overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; background-size: cover; background-position: center; }
    .season-card .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
    .season-card .season-number { position: relative; z-index: 2; font-family: var(--font-title); font-size: 1.5rem; color: #fff; }
    .season-card:hover .overlay { background: rgba(0,0,0,0.3); }

    /* ── TABS ── */
    .tabs-nav { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
    .tab-btn { padding: 8px 18px; border-radius: var(--radius-pill); border: 1px solid var(--border-medium); background: transparent; color: var(--text-secondary); cursor: pointer; transition: all var(--transition-fast); font-size: 0.8rem; }
    .tab-btn.active { background: var(--popup-btn); color: #fff; border-color: var(--popup-btn); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── RECOMMENDATIONS GRID ── */
    .grid-section { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin: 20px 0; }
    @media (min-width: 768px) { .grid-section { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); } }
    .grid-card { border-radius: var(--radius-md); overflow: hidden; cursor: pointer; transition: transform var(--transition-fast); position: relative; }
    .grid-card:hover { transform: translateY(-4px); }
    .grid-card .card-poster { width: 100%; aspect-ratio: 2/3; background-size: cover; background-position: center; position: relative; }
    .grid-card .card-poster .quality-badge { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.7); color: #fff; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; }
    .grid-card .card-poster .score-badge { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.7); color: var(--accent-gold); font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; }
    .grid-card .card-title { font-size: 0.85rem; font-weight: 600; text-align: center; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .grid-card .card-meta { font-size: 0.7rem; color: var(--text-muted); text-align: center; margin-top: 2px; }

    /* ── SIDEBAR ── */
    .main-layout { display: flex; gap: 20px; }
    .main-content { flex: 0 0 78%; max-width: 78%; }
    .right-sidebar { flex: 0 0 22%; max-width: 22%; }
    .sidebar-section { margin-bottom: 24px; }
    .sidebar-title { font-family: var(--font-title); font-size: 1.2rem; color: var(--text-widget-title); margin-bottom: 10px; }
    .sidebar-card { display: flex; gap: 10px; align-items: center; padding: 8px; border-radius: var(--radius-sm); background: var(--bg-surface); margin-bottom: 8px; cursor: pointer; transition: background var(--transition-fast); }
    .sidebar-card:hover { background: rgba(255,255,255,0.06); }
    .sidebar-card img { width: 45px; height: 65px; border-radius: 4px; object-fit: cover; }
    .sidebar-card .info { flex: 1; }
    .sidebar-card .title { font-size: 0.8rem; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .sidebar-card .meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

    @media (max-width: 900px) {
      .main-layout { flex-direction: column; }
      .main-content, .right-sidebar { flex: 1; max-width: 100%; }
      .poster-overlap { flex-direction: column; align-items: center; margin-top: -40px; }
      .poster-img { width: 140px; }
      .title-metadata { margin-left: 0; text-align: center; }
      .btn-row { justify-content: center; }
    }
  </style>
</head>
<body>
  <!-- header injected by shared.js -->

  <div class="container" style="max-width:1400px; margin:0 auto; padding:0 16px;">
    <!-- Breadcrumbs -->
    <div class="breadcrumbs" id="breadcrumbs"></div>

    <!-- Main layout -->
    <div class="main-layout">
      <!-- MAIN CONTENT -->
      <div class="main-content" id="mainContent">
        <!-- Dynamic content will be injected here -->
      </div>

      <!-- RIGHT SIDEBAR -->
      <aside class="right-sidebar" id="rightSidebar">
        <div class="sidebar-section" id="sidebarHiddenGem"></div>
        <div class="sidebar-section" id="sidebarTopRanking"></div>
        <div class="sidebar-section" id="sidebarMostFav"></div>
      </aside>
    </div>
  </div>

  <!-- POPUP for artwork -->
  <div id="artworkPopup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;" onclick="this.style.display='none'">
    <img id="artworkPopupImg" style="max-width:90%; max-height:90%; border-radius:8px;" onclick="event.stopPropagation()">
  </div>

  <!-- Alert for non‑logged‑in bookmark -->
  <div id="loginAlert" style="display:none; position:fixed; bottom:16px; right:16px; background:var(--bg-popup); border:1px solid var(--border-medium); padding:12px 16px; border-radius:var(--radius-md); z-index:800; max-width:300px;">
    <i class="fa-solid fa-circle-exclamation" style="color: var(--accent-gold);"></i> Please log in to use bookmarks.
    <button onclick="this.parentElement.style.display='none'" style="margin-left:8px; background:none; border:none; color:#fff; cursor:pointer;">&times;</button>
  </div>

  <!-- footer injected by shared.js -->

  <script>
    (function() {
      // ----- CONFIG -----
      const TMDB_WORKER = 'https://aniocen.bionmovies47.workers.dev';
      const JIKAN_BASE = 'https://api.jikan.moe/v4';
      const TMDB_IMAGE = 'https://image.tmdb.org/t/p';
      const ANIMETHEMES_API = 'https://api.animethemes.moe';
      const ANIMETHEMES_VIDEO = 'https://v.animethemes.moe';

      // ----- STATE -----
      let showData = null;
      let showType = '';   // 'anime', 'movie', 'tv'
      let showId = '';
      let currentUser = null;
      let selectedStatuses = [];

      // ----- URL PARSING -----
      function parseUrl() {
        // Expect: /info/type/jikan-21/One-Piece or /info/type/tmdb-movie-550/Fight-Club
        const parts = location.pathname.split('/').filter(Boolean);
        // parts: ["info", "type", "jikan-21", "One-Piece"]
        if (parts.length < 3) return false;
        const prefix = parts[2]; // "jikan-21" or "tmdb-movie-550"
        if (prefix.startsWith('jikan-')) {
          showType = 'anime';
          showId = prefix.replace('jikan-', '');
        } else if (prefix.startsWith('tmdb-movie-')) {
          showType = 'movie';
          showId = prefix.replace('tmdb-movie-', '');
        } else if (prefix.startsWith('tmdb-tv-')) {
          showType = 'tv';
          showId = prefix.replace('tmdb-tv-', '');
        } else {
          return false;
        }
        return true;
      }

      // ----- TMDB FETCH (via Cloudflare Worker) -----
      async function fetchTMDB(endpoint) {
        const url = `${TMDB_WORKER}/3/${endpoint}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`TMDB error: ${res.status}`);
        return res.json();
      }

      async function fetchJikan(endpoint) {
        const url = `${JIKAN_BASE}/${endpoint}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('Jikan error');
        return res.json();
      }

      // ----- LOAD SHOW DATA -----
      async function loadShow() {
        if (!parseUrl()) {
          document.getElementById('mainContent').innerHTML = '<p style="padding:40px; text-align:center; color:var(--text-muted);">Invalid show URL.</p>';
          return;
        }
        try {
          if (showType === 'anime') {
            const { data } = await fetchJikan(`anime/${showId}/full`);
            showData = data;
          } else {
            const endpoint = showType === 'movie' ? 'movie' : 'tv';
            const data = await fetchTMDB(`${endpoint}/${showId}?append_to_response=credits,videos,images`);
            showData = data;
          }
          renderPage();
          loadSidebars();
          loadMoreLikeThis();
          loadSunkenTreasures();
        } catch (e) {
          console.error(e);
          document.getElementById('mainContent').innerHTML = `<p style="padding:40px; text-align:center; color:var(--text-muted);">Failed to load show details. Please try again.</p>`;
        }
      }

      function renderPage() {
        const main = document.getElementById('mainContent');
        main.innerHTML = buildMainHTML();
        // Init UI after DOM update
        initBookmark();
        initShare();
        updateBreadcrumbs();
        if ((showType === 'anime' || showType === 'tv') && showData.seasons?.length > 1) {
          renderSeasons();
        }
        initTabs();
      }

      function buildMainHTML() {
        const s = showData;
        const isAnime = showType === 'anime';
        const title = isAnime ? (s.title_english || s.title) : (s.title || s.name);
        const backdrop = isAnime ? (s.images?.jpg?.large_image_url) : s.backdrop_path ? `${TMDB_IMAGE}/w1280${s.backdrop_path}` : '';
        const poster = isAnime ? s.images?.jpg?.large_image_url : s.poster_path ? `${TMDB_IMAGE}/w500${s.poster_path}` : '';
        const score = isAnime ? s.score : s.vote_average;
        const format = isAnime ? (s.type || 'TV') : (s.media_type || 'movie').toUpperCase();
        const duration = isAnime ? (s.duration || 'N/A') : (s.runtime ? `${s.runtime}min` : 'N/A');
        const status = isAnime ? s.status : (s.status || 'Released');
        const year = isAnime ? (s.aired?.from ? new Date(s.aired.from).getFullYear() : '?') : (new Date(s.release_date || s.first_air_date).getFullYear() || '?');
        const cert = isAnime ? s.rating : (s.adult ? '18+' : 'PG-13');
        const episodes = isAnime ? s.episodes : s.number_of_episodes;

        let html = `
          <div class="backdrop-wrap"><img src="${backdrop || poster}" alt=""></div>
          <div class="poster-overlap">
            <img class="poster-img" src="${poster}" alt="${title}">
            <div class="title-metadata">
              <h1 class="show-title">${title}</h1>
              <div class="meta-row">
                <span>${format} • ${status} • ${year} • ${duration} • ${cert}</span>
                ${episodes ? `<span>${episodes} Ep</span>` : ''}
              </div>
              ${isAnime ? `<span class="badge-sub"><i class="fa-solid fa-closed-captioning"></i> Sub</span> <span class="badge-dub"><i class="fa-solid fa-microphone"></i> Dub</span>` : ''}
            </div>
          </div>
          <div class="btn-row">
            <a href="/watch/${showType}/${showId}" class="btn-watch"><i class="fa-solid fa-play"></i> Watch Now</a>
            <div class="btn-addlist" id="addToListWrapper">
              <button id="addToListBtn"><i class="fa-regular fa-bookmark"></i> Add to List</button>
              <div class="status-dropdown" id="statusDropdown">
                ${['Planning to Watch','Watching','Completed','Re-watching','Dropped','My Favourite'].map(st => `<label><input type="checkbox" value="${st}"> ${st}</label>`).join('')}
              </div>
            </div>
            <div class="share-btn" id="shareBtn"><i class="fa-solid fa-share-nodes"></i></div>
          </div>
          <div class="info-box">
            <div class="item"><div class="label">${isAnime?'MAL':'TMDB'} Score</div><div class="value"><i class="fa-regular fa-star" style="color:${isAnime?'#2e51a2':'var(--accent-gold)'};"></i> ${score||'N/A'}</div></div>
            <div class="item"><div class="label">Format</div><div class="value">${format}</div></div>
            <div class="item"><div class="label">Duration</div><div class="value">${duration}</div></div>
          </div>
          <div class="synopsis-box">
            <h3>${isAnime?'Synopsis':'Overview'}</h3>
            <p>${isAnime ? (s.synopsis||'No description.') : (s.overview||'No description.')}</p>
          </div>
          <div class="details-grid" id="detailsGrid"></div>
        `;
        return html;
      }

      function populateDetails() {
        const grid = document.getElementById('detailsGrid');
        if (!grid || !showData) return;
        const s = showData;
        const isAnime = showType === 'anime';
        let items = [];
        items.push({label:'Title', value: isAnime ? (s.title_english || s.title) : (s.title||s.name)});
        if (isAnime && s.title_japanese) items.push({label:'Japanese', value: s.title_japanese});
        const synonyms = s.synonyms?.length ? s.synonyms.join('; ') : '';
        if (synonyms) items.push({label:'Synonyms', value: synonyms});
        items.push({label:'Country', value: isAnime ? 'Japan' : (s.origin_country?.[0] || 'N/A')});
        const genres = isAnime ? (s.genres||[]) : (s.genres||[]);
        const genresHtml = genres.map(g => `<a href="/genre/${(g.name||g).toLowerCase().replace(/\s+/g,'-')}" class="genre-tag" style="background:var(--genre-tag-bg); color:#fff; padding:4px 10px; border-radius:20px; font-size:0.75rem;">${g.name||g}</a>`).join('');
        items.push({label:'Genres', value: `<div class="genres-tags">${genresHtml}</div>`, html:true});
        if (isAnime && s.aired?.from) {
          const from = new Date(s.aired.from).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
          const to = s.aired.to ? new Date(s.aired.to).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : '?';
          items.push({label:'Aired', value: `${from} to ${to}`});
        } else if (s.release_date || s.first_air_date) {
          items.push({label:'Released', value: s.release_date || s.first_air_date});
        }
        items.push({label:'Status', value: isAnime ? s.status : (s.status||'N/A')});
        if ((isAnime || showType==='tv') && s.broadcast?.string) items.push({label:'Broadcast', value: s.broadcast.string});
        if (showType !== 'movie') {
          const eps = isAnime ? s.episodes : s.number_of_episodes;
          if (eps) items.push({label:'Episodes', value: eps});
        }
        items.push({label:'Duration', value: isAnime ? (s.duration||'N/A') : (s.runtime?`${s.runtime} min`:'N/A')});
        if (isAnime && s.premiered) items.push({label:'Premiered', value: `<a href="/season/${s.premiered.toLowerCase().replace(/\s+/,'-')}">${s.premiered}</a>`, html:true});
        items.push({label:'Score', value: `⭐ ${isAnime ? s.score : s.vote_average}`});
        items.push({label:'Content Rating', value: isAnime ? s.rating : (s.adult?'18+':'PG-13')});
        const studios = isAnime ? s.studios?.map(st=>st.name) : (s.production_companies?.map(c=>c.name) || s.networks?.map(n=>n.name));
        if (studios?.length) items.push({label: isAnime?'Studios':'Studios/Networks', value: studios.slice(0,3).join(', ')});
        if (isAnime && s.producers?.length) items.push({label:'Producers', value: s.producers.map(p=>p.name).join(', ')});
        const ext = [];
        if (isAnime) ext.push(`<a href="https://myanimelist.net/anime/${s.mal_id}" target="_blank"><svg width="20" height="20" viewBox="0 0 512 512"><circle cx="256" cy="256" r="256" fill="#2e51a2"/><path d="M432.49 410.61V590.3l-44.86-.06V479l-43.31 51.29-42.43-52.44-.43 112.75H256V410.65h47l39.79 54.29 43-54.31zm184.06 44.14.53 135.15h-50.45l-.17-61.25h-59.73c1.49 10.65 4.48 27 8.9 38 3.31 8.13 6.36 16 12.44 24.06l-36.37 24c-7.45-13.57-13.27-28.52-18.73-44.42a198.31 198.31 0 0 1-10.82-46.49c-1.81-16-2.07-31.38 2.28-47.19a83.37 83.37 0 0 1 24.77-39.81c6.68-6.25 16-10.67 23.47-14.66s15.85-5.63 23.62-7.66a158 158 0 0 1 25.41-3.9c8.49-.73 23.62-1.41 51-.6l11.63 37.31h-58.78c-12.65.17-18.73 0-28.61 4.46a47.7 47.7 0 0 0-27.26 41l56.81.7.81-38.61h49.26zM701.72 410v141.35L768 552l-9.17 37.87H656.28V409.33z" style="fill:#fff"/></svg></a>`);
        if (!isAnime) ext.push(`<a href="https://www.themoviedb.org/${showType==='movie'?'movie':'tv'}/${s.id}" target="_blank"><i class="fa-brands fa-mdb" style="font-size:1.5rem;"></i></a>`);
        items.push({label:'External', value: ext.join(' '), html:true});
        grid.innerHTML = items.map(i => `<div class="detail-item"><div class="label">${i.label}</div><div class="value">${i.html ? i.value : i.value}</div></div>`).join('');
      }

      function updateBreadcrumbs() {
        const title = showType==='anime' ? (showData.title_english || showData.title) : (showData.title||showData.name);
        const typeLabel = showType.charAt(0).toUpperCase()+showType.slice(1);
        document.getElementById('breadcrumbs').innerHTML = `
          <a href="/"><i class="fa-solid fa-house"></i> Home</a>
          <span class="separator"><i class="fa-solid fa-chevron-right"></i></span>
          <a href="/type/${showType}"><i class="fa-solid fa-layer-group"></i> ${typeLabel}</a>
          <span class="separator"><i class="fa-solid fa-chevron-right"></i></span>
          <span class="current">${title}</span>
        `;
      }

      // ----- BOOKMARK (Supabase) -----
      function initBookmark() {
        const btn = document.getElementById('addToListBtn');
        const dropdown = document.getElementById('statusDropdown');
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!window.supabaseClient?.auth.user()) {
            document.getElementById('loginAlert').style.display = 'block';
            setTimeout(() => document.getElementById('loginAlert').style.display = 'none', 3000);
            return;
          }
          dropdown.classList.toggle('open');
        });
        document.addEventListener('click', () => dropdown.classList.remove('open'));
        loadBookmarks();
      }

      async function loadBookmarks() {
        const user = window.supabaseClient?.auth.user();
        if (!user) return;
        const { data } = await window.supabaseClient.from('user_bookmarks').select('status').eq('user_id', user.id).eq('media_id', showId);
        if (data) {
          selectedStatuses = data.map(r=>r.status);
          updateDropdownCheckboxes();
        }
      }

      function updateDropdownCheckboxes() {
        document.querySelectorAll('#statusDropdown input[type=checkbox]').forEach(cb => {
          cb.checked = selectedStatuses.includes(cb.value);
        });
      }

      window.updateBookmark = async function() {
        const checked = document.querySelectorAll('#statusDropdown input[type=checkbox]:checked');
        const statuses = Array.from(checked).map(cb=>cb.value);
        selectedStatuses = statuses;
        const user = window.supabaseClient?.auth.user();
        if (!user) return;
        await window.supabaseClient.from('user_bookmarks').delete().eq('user_id', user.id).eq('media_id', showId);
        if (statuses.length > 0) {
          const rows = statuses.map(st => ({
            user_id: user.id,
            media_id: showId,
            media_type: showType,
            status: st
          }));
          await window.supabaseClient.from('user_bookmarks').insert(rows);
        }
      };

      // ----- SHARE -----
      function initShare() {
        document.getElementById('shareBtn').addEventListener('click', () => {
          if (navigator.share) {
            navigator.share({ title: document.title, url: location.href });
          } else {
            navigator.clipboard.writeText(location.href).then(() => alert('Link copied!'));
          }
        });
      }

      // ----- SEASONS -----
      function renderSeasons() {
        const seasons = showData.seasons.filter(s => s.season_number > 0).sort((a,b)=>b.season_number - a.season_number);
        if (!seasons.length) return;
        const container = document.createElement('div');
        container.innerHTML = `<h3 style="font-family:var(--font-title); color:var(--text-widget-title); margin:16px 0 10px;">Watch More Seasons</h3><div class="seasons-grid">`+ seasons.map(s => `
          <a href="/info/type/${showType==='anime'?'jikan':`tmdb-${showType}`}-${showType==='anime'?`${showData.mal_id}`:`${showId}`}/${encodeURIComponent(showData.title||showData.name)}?season=${s.season_number}" class="season-card" style="background-image:url('${s.poster_path ? `${TMDB_IMAGE}/w500${s.poster_path}` : ''}');">
            <div class="overlay"></div>
            <div class="season-number">Season ${s.season_number}</div>
          </a>`).join('') + `</div>`;
        document.getElementById('mainContent').appendChild(container);
      }

      // ----- TABS -----
      function initTabs() {
        const tabsContainer = document.createElement('div');
        tabsContainer.innerHTML = `
          <div class="tabs-nav" id="tabsNav">
            <button class="tab-btn active" data-tab="cast">Cast/Crew</button>
            <button class="tab-btn" data-tab="artwork">Artwork</button>
            <button class="tab-btn" data-tab="trailer">Trailer</button>
            <button class="tab-btn" data-tab="themes">Themes</button>
            <button class="tab-btn" data-tab="stats">Statistics</button>
          </div>
          <div class="tab-content active" id="tabContent"></div>
        `;
        document.getElementById('mainContent').appendChild(tabsContainer);
        document.getElementById('tabsNav').addEventListener('click', (e) => {
          if (e.target.classList.contains('tab-btn')) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            switchTab(e.target.dataset.tab);
          }
        });
        switchTab('cast');
      }

      function switchTab(tab) {
        const content = document.getElementById('tabContent');
        content.innerHTML = `<p style="padding:20px;">Loading ${tab}...</p>`;
        if (tab === 'cast') loadCast();
        else if (tab === 'artwork') loadArtwork();
        else if (tab === 'trailer') loadTrailer();
        else if (tab === 'themes') loadThemes();
        else if (tab === 'stats') loadStats();
      }

      async function loadCast() {
        const content = document.getElementById('tabContent');
        let castData;
        if (showType === 'anime') {
          const res = await fetchJikan(`anime/${showData.mal_id}/characters`);
          castData = (res.data || []).slice(0, 20);
        } else {
          const endpoint = showType === 'movie' ? 'movie' : 'tv';
          const res = await fetchTMDB(`${endpoint}/${showId}/credits`);
          castData = (res.cast || []).slice(0, 20);
        }
        content.innerHTML = castData.map(c => {
          const charImg = showType==='anime' ? c.character?.images?.jpg?.image_url : c.profile_path ? `${TMDB_IMAGE}/w92${c.profile_path}` : '';
          const actorImg = showType==='anime' ? c.voice_actors?.[0]?.images?.jpg?.image_url : c.profile_path ? `${TMDB_IMAGE}/w92${c.profile_path}` : '';
          const charName = showType==='anime' ? c.character?.name : c.character;
          const role = showType==='anime' ? c.role : '';
          const actorName = showType==='anime' ? c.voice_actors?.[0]?.name : c.name;
          return `<div style="display:flex; gap:12px; margin-bottom:12px; align-items:center;">
            <img src="${charImg}" style="width:50px;height:50px;border-radius:50%;object-fit:cover;">
            <div style="flex:1;">
              <div style="font-weight:600;">${charName}</div>
              <div style="font-size:0.75rem;color:var(--text-muted);">${role}</div>
            </div>
            <img src="${actorImg}" style="width:50px;height:50px;border-radius:50%;object-fit:cover;">
            <div style="flex:1;">
              <div style="font-weight:600;">${actorName}</div>
              <div style="font-size:0.75rem;color:var(--text-muted);">${showType==='anime' ? c.voice_actors?.[0]?.language : ''}</div>
            </div>
          </div>`;
        }).join('') || '<p>No cast information.</p>';
      }

      async function loadArtwork() {
        const content = document.getElementById('tabContent');
        let images = [];
        if (showType === 'anime') {
          const res = await fetchJikan(`anime/${showData.mal_id}/pictures`);
          images = (res.data || []).map(p => p.jpg?.large_image_url || p.jpg?.image_url).filter(Boolean);
        } else {
          const res = await fetchTMDB(`${showType==='movie'?'movie':'tv'}/${showId}/images`);
          images = [...(res.backdrops||[]).slice(0,6).map(b => `${TMDB_IMAGE}/w780${b.file_path}`), ...(res.posters||[]).slice(0,6).map(p => `${TMDB_IMAGE}/w500${p.file_path}`)];
        }
        content.innerHTML = `<div style="display:grid; grid-template-columns:repeat(2,1fr); gap:8px;">${images.map(img => `
          <img src="${img}" style="width:100%; border-radius:8px; cursor:pointer;" onclick="document.getElementById('artworkPopup').style.display='flex';document.getElementById('artworkPopupImg').src='${img}'">
        `).join('')}</div>`;
      }

      async function loadTrailer() {
        const content = document.getElementById('tabContent');
        let trailerUrl = '';
        if (showType === 'anime' && showData.trailer?.youtube_id) {
          trailerUrl = `https://www.youtube.com/embed/${showData.trailer.youtube_id}`;
        } else if (showData.videos?.results?.length) {
          const trailer = showData.videos.results.find(v => v.type==='Trailer' && v.site==='YouTube');
          if (trailer) trailerUrl = `https://www.youtube.com/embed/${trailer.key}`;
        }
        if (trailerUrl) {
          content.innerHTML = `<div style="position:relative;padding-top:56.25%;"><iframe src="${trailerUrl}" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen></iframe></div>`;
        } else {
          content.innerHTML = '<p>No trailer available.</p>';
        }
      }

      async function loadThemes() {
        const content = document.getElementById('tabContent');
        if (showType !== 'anime') { content.innerHTML = '<p>Theme songs only available for anime.</p>'; return; }
        try {
          const res = await fetch(`${ANIMETHEMES_API}/anime?filter[mal_id]=${showData.mal_id}&include=animethemes.animethemeentries.videos,animethemes.song.artists`);
          const json = await res.json();
          const themes = json?.anime?.[0]?.animethemes || [];
          if (!themes.length) { content.innerHTML = '<p>No theme songs found.</p>'; return; }
          let html = '';
          ['OP','ED'].forEach(type => {
            const filtered = themes.filter(t => t.type === type);
            if (filtered.length) {
              html += `<h4 style="margin:16px 0 10px;">${type==='OP'?'Opening':'Ending'} Themes</h4>`;
              filtered.forEach(t => {
                const entry = t.animethemeentries?.[0];
                const video = entry?.videos?.[0];
                if (video) {
                  html += `<div style="margin-bottom:12px;"><div style="font-weight:600; margin-bottom:4px;">${t.song?.title||''} - ${t.song?.artists?.map(a=>a.name).join(', ')||''}</div>
                  <video controls style="width:100%; border-radius:8px;"><source src="${ANIMETHEMES_VIDEO}/${video.basename}" type="video/webm"></video></div>`;
                }
              });
            }
          });
          content.innerHTML = html || '<p>No theme videos available.</p>';
        } catch (e) {
          content.innerHTML = '<p>Failed to load themes.</p>';
        }
      }

      function loadStats() {
        const content = document.getElementById('tabContent');
        content.innerHTML = '<p>Statistics placeholder (Jikan stats endpoint can be added).</p>';
      }

      // ----- MORE LIKE THIS (TMDB Discover) -----
      async function loadMoreLikeThis() {
        if (showType === 'anime') return;
        const type = showType === 'movie' ? 'movie' : 'tv';
        const country = showData.origin_country?.[0] || 'US';
        const genreIds = showData.genres?.map(g=>g.id).join('|') || '';
        try {
          const data = await fetchTMDB(`discover/${type}?sort_by=popularity.desc&with_genres=${genreIds}&with_origin_country=${country}&page=1`);
          const results = (data.results || []).filter(r => r.id !== parseInt(showId)).slice(0, 30);
          const container = document.createElement('div');
          container.innerHTML = '<h3 style="font-family:var(--font-title); color:var(--text-widget-title); margin:20px 0 10px;">More Like This</h3><div class="grid-section" id="moreGrid"></div>';
          document.getElementById('mainContent').appendChild(container);
          const grid = document.getElementById('moreGrid');
          grid.innerHTML = results.map(item => {
            const poster = item.poster_path ? `${TMDB_IMAGE}/w500${item.poster_path}` : '';
            const title = item.title || item.name;
            const year = (item.release_date || item.first_air_date || '').slice(0,4);
            const duration = item.media_type==='movie' ? '2h 10m' : '45m/ep';
            const score = item.vote_average;
            return `<a href="/info/type/tmdb-${item.media_type||'movie'}-${item.id}/${encodeURIComponent(title)}" class="grid-card">
              <div class="card-poster" style="background-image:url('${poster}');">
                <span class="quality-badge">HD</span>
                <span class="score-badge">⭐ ${score}</span>
              </div>
              <div class="card-title">${title}</div>
              <div class="card-meta">${item.media_type?.toUpperCase()||'TV'} • ${year} • ${duration}</div>
            </a>`;
          }).join('');
        } catch(e) { console.warn('More Like This failed', e); }
      }

      // ----- SUNKEN TREASURES (Jikan recommendations) -----
      async function loadSunkenTreasures() {
        if (showType === 'anime') return;
        const jikanType = showType==='movie' ? 'movie' : 'tv';
        const country = showData.origin_country?.[0] || 'US';
        if (country === 'CN' || country === 'KR') jikanType = 'ona';
        const genreMap = {28:1,12:2,35:4,80:7,18:8,14:10,36:13,27:14,10402:19,10749:22,878:24,10759:1,10765:10,10768:38};
        const targetGenres = showData.genres?.map(g => genreMap[g.id]).filter(Boolean) || [];
        const url = new URL(`${JIKAN_BASE}/anime`);
        url.searchParams.append('type', jikanType);
        url.searchParams.append('order_by', 'popularity');
        url.searchParams.append('sort', 'asc');
        url.searchParams.append('limit', '30');
        if (targetGenres.length) url.searchParams.append('genres', targetGenres.slice(0,3).join(','));
        try {
          const res = await fetch(url.toString());
          const { data } = await res.json();
          const container = document.createElement('div');
          container.innerHTML = '<h3 style="font-family:var(--font-title); color:var(--text-widget-title); margin:20px 0 10px;">Sunken Treasures</h3><div class="grid-section" id="sunkenGrid"></div>';
          document.getElementById('mainContent').appendChild(container);
          const grid = document.getElementById('sunkenGrid');
          grid.innerHTML = (data || []).map(anime => {
            const poster = anime.images?.jpg?.large_image_url || '';
            const studio = anime.studios?.[0]?.name || 'Independent';
            return `<a href="/info/type/jikan-${anime.mal_id}/${encodeURIComponent(anime.title_english||anime.title)}" class="grid-card">
              <div class="card-poster" style="background-image:url('${poster}');">
                <span class="quality-badge">HD</span>
                <span class="score-badge">⭐ ${anime.score||'N/A'}</span>
              </div>
              <div class="card-title">${anime.title_english || anime.title}</div>
              <div class="card-meta">${anime.type} • ${anime.episodes||'?'} Ep • ${studio}</div>
            </a>`;
          }).join('');
        } catch(e) { console.warn('Sunken Treasures failed', e); }
      }

      // ----- SIDEBARS -----
      async function loadSidebars() {
        const isAnime = showType === 'anime';
        if (isAnime) {
          loadSidebar('sidebarHiddenGem', 'Hidden Gem', `https://api.jikan.moe/v4/anime?min_score=8.0&order_by=popularity&sort=desc&limit=17`, 'jikan');
          loadSidebar('sidebarTopRanking', 'Top Ranking', `https://api.jikan.moe/v4/top/anime?limit=19`, 'jikan');
          loadSidebar('sidebarMostFav', 'Most Favourite', `https://api.jikan.moe/v4/top/anime?filter=favorite&limit=21`, 'jikan');
        } else {
          const type = showType === 'movie' ? 'movie' : 'tv';
          loadSidebar('sidebarHiddenGem', 'Hidden Gem', `${TMDB_WORKER}/3/discover/${type}?vote_average.gte=7.8&vote_count.gte=150&vote_count.lte=1200&sort_by=popularity.asc&page=1`, 'tmdb');
          loadSidebar('sidebarTopRanking', 'Top Ranking', `${TMDB_WORKER}/3/${type}/top_rated?page=1`, 'tmdb');
          loadSidebar('sidebarMostFav', 'Most Favourite', `${TMDB_WORKER}/3/${type}/popular?page=1`, 'tmdb');
        }
      }

      async function loadSidebar(containerId, title, url, source) {
        const container = document.getElementById(containerId);
        container.innerHTML = `<div class="sidebar-title"><i class="fa-${source==='jikan'?'regular fa-gem':'solid fa-star'}" style="color:var(--accent-blue);"></i> ${title}</div>`;
        const res = await fetch(url);
        const data = await res.json();
        const items = source==='jikan' ? data.data : data.results;
        const max = source==='jikan' ? (containerId==='sidebarHiddenGem'?17:19) : 21;
        container.innerHTML += (items || []).slice(0, max).map((item, idx) => {
          const poster = source==='jikan' ? item.images?.jpg?.image_url : item.poster_path ? `${TMDB_IMAGE}/w185${item.poster_path}` : '';
          const title = source==='jikan' ? (item.title_english || item.title) : (item.title || item.name);
          const meta = source==='jikan' ? `⭐ ${item.score} • ${item.type}` : `⭐ ${item.vote_average} • ${item.media_type}`;
          const link = source==='jikan' ? `/info/type/jikan-${item.mal_id}/${encodeURIComponent(title)}` : `/info/type/tmdb-${item.media_type||'movie'}-${item.id}/${encodeURIComponent(title)}`;
          return `<a href="${link}" class="sidebar-card">
            <img src="${poster}" onerror="this.style.display='none'">
            <div class="info">
              <div class="title">${title}</div>
              <div class="meta">${meta}</div>
            </div>
          </a>`;
        }).join('');
      }

      // ----- INIT -----
      document.addEventListener('DOMContentLoaded', async () => {
        // Wait for shared.js to expose supabaseClient
        if (window.supabaseClient) {
          const { data: { session } } = await window.supabaseClient.auth.getSession();
          currentUser = session?.user || null;
        }
        await loadShow();
        populateDetails();
      });
    })();
  </script>
</body>
</html>
